<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Document</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="Description" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0"
    />
    <link
      rel="stylesheet"
      href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css"
    />
    <link
      rel="stylesheet"
      href="//cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.css"
    />
    <style>
      pre {
        background: #f8f8f8 !important;
        border-radius: 8px;
        padding: 16px;
      }
      pre code {
        background: transparent !important;
        color: #24292e;
      }
      code {
        background: #f0f0f0 !important;
        color: #d73a49;
        border-radius: 4px;
        padding: 2px 6px;
      }
      .markdown-section {
        max-width: 900px;
        margin: 0 auto;
        padding: 30px 40px;
        box-sizing: border-box;
        width: 100%;
      }
      .markdown-section * {
        box-sizing: border-box;
      }
      .markdown-section hr {
        border: none;
        height: 1px;
        background: linear-gradient(
          to right,
          transparent,
          #e0e0e0,
          transparent
        );
        margin: 24px 0;
      }
      .markdown-section a {
        color: #3b82f6;
        text-decoration: none;
      }
      .markdown-section a:hover {
        text-decoration: underline;
      }
      .markdown-section blockquote {
        border-left: 3px solid #3b82f6;
        background: #f8f9fa;
        margin: 16px 0;
        padding: 12px 20px;
      }
      .mermaid {
        background: #fff;
        border-radius: 8px;
        padding: 16px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="//cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
      window.$docsify = {
        name: '',
        repo: '',
        markdown: {
          renderer: {
            code: function (code, lang) {
              if (lang === 'mermaid') {
                return '<div class="mermaid">' + code + '</div>'
              }
              var result = this.origin.code.call(this, code, lang)
              return result
            },
          },
        },
      }
    </script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
    <!-- 3. 引入 docsify-mermaid 插件 (必须在 docsify.js 之后) -->
    <script src="//cdn.jsdelivr.net/npm/docsify-mermaid@latest/dist/docsify-mermaid.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        mermaid.initialize({
          startOnLoad: false,
          theme: 'default',
        })
        mermaid.run()
      })
    </script>
  </body>
</html>
