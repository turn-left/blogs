<!doctype html>
<html lang="zh-cn">
  <head>
    <meta charset="UTF-8" />
    <title>我的技术 Wiki</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="个人技术总结与学习笔记" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0"
    />

    <!-- 主题样式：推荐使用官方纯净版，也可以换成 vue.css 或 dark.css -->
    <link
      rel="stylesheet"
      href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css"
    />

    <!-- 侧边栏折叠插件样式 -->
    <link
      rel="stylesheet"
      href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css"
    />
  </head>
  <body>
    <div id="app">加载中...</div>
    <script>
      window.$docsify = {
        name: '个人技术 Wiki', // 文档标题
        repo: '', // 填写你的 GitHub 仓库地址，右上方会出现 GitHub 挂件

        // 核心配置
        loadSidebar: true, // 开启侧边栏，需配合 _sidebar.md
        loadNavbar: true, // 开启导航栏，需配合 _navbar.md
        subMaxLevel: 3, // 侧边栏显示的目录层级
        coverpage: true, // 开启封面，需配合 _coverpage.md
        onlyCover: false, // 访问主页时是否仅显示封面

        // 搜索配置
        search: {
          maxAge: 86400000, // 过期时间，单位毫秒，默认一天
          paths: 'auto',
          placeholder: '搜索...',
          noData: '未找到相关内容',
          depth: 6,
        },

        // 侧边栏折叠配置
        sidebarDisplayLevel: 1, // 默认展开层级

        // 代码块复制按钮文字
        copyCode: {
          buttonText: '复制',
          errorText: '失败',
          successText: '已复制',
        },
      }
    </script>

    <!-- Docsify 核心库 -->
    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>

    <!-- 全文搜索插件 -->
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>

    <!-- 图片缩放插件 -->
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>

    <!-- 代码块一键复制插件 -->
    <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>

    <!-- 侧边栏折叠插件 -->
    <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>

    <!-- 语法高亮支持 (按需添加更多语言) -->
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
  </body>
</html>
